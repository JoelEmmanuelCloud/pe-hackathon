global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "pe-hackathon-app"
    static_configs:
      - targets:
          - "app1:5000"
          - "app2:5000"
    metrics_path: /metrics
    scrape_interval: 10s
